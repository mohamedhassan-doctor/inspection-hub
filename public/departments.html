<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الأقسام | Inspection Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0e7490">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Inspection Hub">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><i class="fas fa-clipboard-check"></i><span>Inspection Hub</span></div>
    <nav class="sidebar-nav">
      <a href="/" class="nav-link" data-page="dashboard"><i class="fas fa-tachometer-alt"></i> لوحة التحكم</a>
      <a href="/inspections" class="nav-link" data-page="inspections"><i class="fas fa-search"></i> الجولات</a>
      <a href="/checklists" class="nav-link" data-page="checklists"><i class="fas fa-list-check"></i> قوائم التدقيق</a>
      <a href="/findings" class="nav-link" data-page="findings"><i class="fas fa-exclamation-triangle"></i> المخالفات</a>
      <a href="/capa" class="nav-link" data-page="capa"><i class="fas fa-tasks"></i> CAPA <span id="capa-badge" class="nav-badge" style="display:none">0</span></a>
      <a href="/reports" class="nav-link" data-page="reports"><i class="fas fa-chart-bar"></i> التقارير</a>
      <a href="/department-performance" class="nav-link quality-only" data-page="department-performance"><i class="fas fa-gauge-high"></i> مؤشرات الأقسام</a>
      <a href="/weekly-schedule" class="nav-link quality-only" data-page="weekly-schedule"><i class="fas fa-calendar-week"></i> جدول المرور</a>
      <a href="/departments" class="nav-link dept-admin" data-page="departments"><i class="fas fa-building"></i> الأقسام 🏥</a>
      <a href="/users" class="nav-link admin-only" data-page="users"><i class="fas fa-users"></i> المستخدمون</a>
    </nav>
    <div class="sidebar-footer"><span id="user-name"></span><a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i></a></div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div class="page-title">إدارة الأقسام <span>إضافة وتعديل أقسام المستشفى</span></div>
      <button class="btn btn-primary" onclick="openCreate()"><i class="fas fa-plus"></i> قسم جديد</button>
    </div>

    <!-- Stats row -->
    <div class="cards-row cols-2" style="margin-bottom:20px" id="dept-stats"></div>

    <div class="card">
      <div class="card-body" style="padding:0">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>اسم القسم</th>
                <th>عدد الجولات</th>
                <th>نسبة التزام القسم</th>
                <th>الإجراءات</th>
              </tr>
            </thead>
            <tbody id="dept-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Dept Modal -->
<div class="modal-overlay" id="dept-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="dept-modal-title">قسم جديد</span>
      <button class="modal-close" onclick="closeModal('dept-modal')">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="d-edit-id">
      <div class="form-group">
        <label class="form-label">اسم القسم *</label>
        <input type="text" id="d-name" class="form-control" placeholder="مثال: الطوارئ"
               onkeydown="if(event.key==='Enter') saveDept()">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('dept-modal')">إلغاء</button>
      <button class="btn btn-primary" onclick="saveDept()"><i class="fas fa-save"></i> حفظ</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/shared.js"></script>
<script>
let allDepts = [];

async function loadDepts() {
  try {
    allDepts = await api('GET', '/api/departments');
    renderStats(allDepts);
    renderTable(allDepts);
  } catch (e) { showToast(e.message, 'error'); }
}

function renderStats(rows) {
  const totalInsp = rows.reduce((s, d) => s + (d.inspection_count || 0), 0);
  document.getElementById('dept-stats').innerHTML = `
    <div class="stat-card">
      <div class="stat-icon teal"><i class="fas fa-building"></i></div>
      <div class="stat-info">
        <div class="stat-value">${rows.length}</div>
        <div class="stat-label">إجمالي الأقسام</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon teal"><i class="fas fa-search"></i></div>
      <div class="stat-info">
        <div class="stat-value">${totalInsp}</div>
        <div class="stat-label">إجمالي الجولات</div>
      </div>
    </div>
  `;
}

function complianceCell(rate) {
  if (rate === null || rate === undefined) {
    return `<span class="badge badge-secondary">لا توجد بيانات</span>`;
  }
  const cls = rate > 90 ? 'badge-success' : rate >= 70 ? 'badge-warning' : 'badge-danger';
  return `<span class="badge ${cls}">${rate}%</span>`;
}

function renderTable(rows) {
  const tbody = document.getElementById('dept-tbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><i class="fas fa-building"></i><p>لا توجد أقسام</p></div></td></tr>';
    return;
  }
  tbody.innerHTML = rows.map((d, idx) => `
    <tr>
      <td style="color:#94a3b8;font-size:13px">${idx + 1}</td>
      <td><strong>${d.name}</strong></td>
      <td>
        <span class="badge ${d.inspection_count > 0 ? 'badge-teal' : 'badge-secondary'}">
          ${d.inspection_count || 0}
        </span>
      </td>
      <td>${complianceCell(d.compliance_rate)}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-secondary btn-sm btn-icon" onclick="editDept(${d.id})" title="تعديل">
          <i class="fas fa-edit"></i>
        </button>
        <button class="btn btn-danger btn-sm btn-icon" onclick="deleteDept(${d.id},'${d.name.replace(/'/g, "\\'")}')" title="حذف">
          <i class="fas fa-trash"></i>
        </button>
      </td>
    </tr>
  `).join('');
}

function openCreate() {
  document.getElementById('d-edit-id').value = '';
  document.getElementById('dept-modal-title').textContent = 'قسم جديد';
  document.getElementById('d-name').value = '';
  openModal('dept-modal');
  setTimeout(() => document.getElementById('d-name').focus(), 100);
}

function editDept(id) {
  const d = allDepts.find(x => x.id === id);
  if (!d) return;
  document.getElementById('d-edit-id').value = id;
  document.getElementById('dept-modal-title').textContent = 'تعديل القسم';
  document.getElementById('d-name').value = d.name;
  openModal('dept-modal');
  setTimeout(() => document.getElementById('d-name').focus(), 100);
}

async function saveDept() {
  const id = document.getElementById('d-edit-id').value;
  const name = document.getElementById('d-name').value.trim();
  if (!name) return showToast('يرجى إدخال اسم القسم', 'warning');
  try {
    if (id) {
      await api('PUT', `/api/departments/${id}`, { name });
      showToast('تم تحديث القسم', 'success');
    } else {
      await api('POST', '/api/departments', { name });
      showToast('تم إضافة القسم بنجاح', 'success');
    }
    closeModal('dept-modal');
    loadDepts();
  } catch (e) { showToast(e.message, 'error'); }
}

async function deleteDept(id, name) {
  if (!confirmAction(`هل تريد حذف قسم "${name}"؟`)) return;
  try {
    await api('DELETE', `/api/departments/${id}`);
    showToast('تم حذف القسم', 'success');
    loadDepts();
  } catch (e) { showToast(e.message, 'error'); }
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

initPage('departments');
loadDepts();
</script>
</body>
</html>
