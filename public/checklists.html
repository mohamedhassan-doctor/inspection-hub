<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>قوائم التدقيق | Inspection Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand"><i class="fas fa-clipboard-check"></i><span>Inspection Hub</span></div>
    <nav class="sidebar-nav">
      <a href="/" class="nav-link" data-page="dashboard"><i class="fas fa-tachometer-alt"></i> لوحة التحكم</a>
      <a href="/inspections" class="nav-link" data-page="inspections"><i class="fas fa-search"></i> الجولات</a>
      <a href="/checklists" class="nav-link" data-page="checklists"><i class="fas fa-list-check"></i> قوائم التدقيق</a>
      <a href="/findings" class="nav-link" data-page="findings"><i class="fas fa-exclamation-triangle"></i> المخالفات</a>
      <a href="/capa" class="nav-link" data-page="capa"><i class="fas fa-tasks"></i> CAPA <span id="capa-badge" class="nav-badge" style="display:none">0</span></a>
      <a href="/reports" class="nav-link" data-page="reports"><i class="fas fa-chart-bar"></i> التقارير</a>
      <a href="/departments" class="nav-link dept-admin" data-page="departments"><i class="fas fa-building"></i> الأقسام 🏥</a>
      <a href="/users" class="nav-link admin-only" data-page="users"><i class="fas fa-users"></i> المستخدمون</a>
    </nav>
    <div class="sidebar-footer"><span id="user-name"></span><a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i></a></div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div class="page-title">قوائم التدقيق <span>إدارة قوالب بنود الفحص لكل قسم</span></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" onclick="openImportModal()"><i class="fas fa-file-import"></i> استيراد Excel</button>
        <button class="btn btn-primary" onclick="openCreateTemplate()"><i class="fas fa-plus"></i> قائمة جديدة</button>
      </div>
    </div>

    <div class="cards-row cols-2" id="checklists-grid" style="align-items:start"></div>
  </main>
</div>

<!-- Template Modal -->
<div class="modal-overlay" id="tmpl-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="tmpl-modal-title">قائمة جديدة</span>
      <button class="modal-close" onclick="closeModal('tmpl-modal')">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="tmpl-edit-id">
      <div class="form-group">
        <label class="form-label">اسم القائمة *</label>
        <input type="text" id="tmpl-name" class="form-control" placeholder="مثال: قائمة تدقيق الطوارئ">
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="tmpl-is-global" onchange="toggleGlobalDept()"> قائمة عامة (تظهر لجميع الأقسام)
        </label>
      </div>
      <div class="form-group" id="tmpl-dept-group">
        <label class="form-label">القسم</label>
        <select id="tmpl-dept" class="form-control"><option value="">— اختر القسم —</option></select>
      </div>
      <div class="form-group">
        <label class="form-label">نوع الجولة المرتبط</label>
        <select id="tmpl-insp-type" class="form-control">
          <option value="">— غير محدد —</option>
          <option value="environmental_safety">السلامة البيئية</option>
          <option value="patient_safety">سلامة المريض</option>
          <option value="infection_control">مكافحة العدوى</option>
          <option value="fire_safety">سلامة الحريق</option>
          <option value="medication">الأدوية</option>
          <option value="medical_equipment">المعدات الطبية</option>
          <option value="facilities_infrastructure">المرافق والبنية التحتية</option>
          <option value="radiation_safety">السلامة الإشعاعية</option>
          <option value="lab_safety">سلامة المعمل</option>
          <option value="surgical_safety">السلامة الجراحية</option>
          <option value="comprehensive_multidisciplinary">جولة شاملة متعددة التخصصات</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('tmpl-modal')">إلغاء</button>
      <button class="btn btn-primary" onclick="saveTemplate()"><i class="fas fa-save"></i> حفظ</button>
    </div>
  </div>
</div>

<!-- Item Modal -->
<div class="modal-overlay" id="item-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="item-modal-title">إضافة بند</span>
      <button class="modal-close" onclick="closeModal('item-modal')">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="item-edit-id">
      <input type="hidden" id="item-tmpl-id">
      <div class="form-group">
        <label class="form-label">نص البند *</label>
        <textarea id="item-text" class="form-control" rows="3" placeholder="أدخل نص البند..."></textarea>
      </div>
      <div class="form-row cols-2">
        <div class="form-group">
          <label class="form-label">مرجع GAHAR</label>
          <input type="text" id="item-gahar" class="form-control" placeholder="مثال: IC.1">
        </div>
        <div class="form-group">
          <label class="form-label">الترتيب</label>
          <input type="number" id="item-order" class="form-control" min="1" value="1">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">المحور</label>
        <input type="text" id="item-section" class="form-control" placeholder="عام" value="عام">
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="item-active" checked> مفعّل
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('item-modal')">إلغاء</button>
      <button class="btn btn-primary" onclick="saveItem()"><i class="fas fa-save"></i> حفظ</button>
    </div>
  </div>
</div>

<!-- Import Modal -->
<div class="modal-overlay" id="import-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">استيراد قائمة من Excel / CSV</span>
      <button class="modal-close" onclick="closeModal('import-modal')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">اسم القائمة *</label>
        <input type="text" id="imp-name" class="form-control" placeholder="مثال: قائمة تدقيق الطوارئ">
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="imp-is-global" onchange="toggleImportGlobal()"> قائمة عامة (تظهر لجميع الأقسام)
        </label>
      </div>
      <div class="form-group" id="imp-dept-group">
        <label class="form-label">القسم</label>
        <select id="imp-dept" class="form-control"><option value="">— اختر القسم —</option></select>
      </div>
      <div class="form-group">
        <label class="form-label">نوع الجولة المرتبط</label>
        <select id="imp-insp-type" class="form-control">
          <option value="">— غير محدد —</option>
          <option value="environmental_safety">السلامة البيئية</option>
          <option value="patient_safety">سلامة المريض</option>
          <option value="infection_control">مكافحة العدوى</option>
          <option value="fire_safety">سلامة الحريق</option>
          <option value="medication">الأدوية</option>
          <option value="medical_equipment">المعدات الطبية</option>
          <option value="facilities_infrastructure">المرافق والبنية التحتية</option>
          <option value="radiation_safety">السلامة الإشعاعية</option>
          <option value="lab_safety">سلامة المعمل</option>
          <option value="surgical_safety">السلامة الجراحية</option>
          <option value="comprehensive_multidisciplinary">جولة شاملة متعددة التخصصات</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">ملف Excel أو CSV *</label>
        <input type="file" id="imp-file" accept=".xlsx,.csv" class="form-control" onchange="handleImportFile(this)">
        <div style="margin-top:8px;display:flex;align-items:center;gap:12px">
          <button class="btn btn-secondary btn-sm" type="button" onclick="downloadSample()">
            <i class="fas fa-download"></i> تحميل ملف نموذجي
          </button>
          <small style="color:#94a3b8;font-size:12px">أعمدة: أ) المحور &nbsp;|&nbsp; ب) البند &nbsp;|&nbsp; ج) GAHAR</small>
        </div>
      </div>
      <div id="imp-preview" style="display:none">
        <p style="font-size:13px;font-weight:600;color:#475569;margin-bottom:6px">معاينة (أول 5 صفوف):</p>
        <div class="table-wrapper" style="max-height:180px;overflow-y:auto">
          <table>
            <thead><tr><th>المحور</th><th>البند</th><th>مرجع GAHAR</th></tr></thead>
            <tbody id="imp-preview-body"></tbody>
          </table>
        </div>
        <p id="imp-total-count" style="font-size:12px;color:#64748b;margin-top:6px"></p>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('import-modal')">إلغاء</button>
      <button class="btn btn-primary" id="imp-confirm-btn" onclick="confirmImport()" disabled>
        <i class="fas fa-file-import"></i> استيراد
      </button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="/js/shared.js"></script>
<script>
let depts = [], checklists = [];
let templateItemsCache = {};
let pendingSections = {};

async function loadInit() {
  depts = await api('GET', '/api/departments');
  const sel = document.getElementById('tmpl-dept');
  depts.forEach(d => {
    const o = document.createElement('option');
    o.value = d.id; o.textContent = d.name;
    sel.appendChild(o);
  });
}

function getSections(tmplId, items) {
  const fromItems = [...new Set(items.map(i => i.section_name || 'عام'))];
  const pending = [...(pendingSections[tmplId] || new Set())];
  const all = [...new Set([...fromItems, ...pending])];
  const idx = all.indexOf('عام');
  if (idx > 0) { all.splice(idx, 1); all.unshift('عام'); }
  return all;
}

function renderChecklistCard(t) {
  const globalBadge = t.is_global ? `<span class="badge badge-teal">عام 🌐</span>` : '';
  const deptLabel = t.is_global ? 'جميع الأقسام' : (t.dept_name || 'عام');
  const typeBadge = t.inspection_type ? `<span class="badge badge-info">${inspTypeLabels[t.inspection_type]||t.inspection_type}</span>` : '';
  return `
    <div class="card" style="margin-bottom:0">
      <div class="card-header">
        <div class="card-title"><i class="fas fa-list-check" style="color:#0e7490"></i> ${t.name}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
          ${globalBadge}
          ${typeBadge}
          <span class="badge badge-secondary">${deptLabel}</span>
          <span class="badge badge-teal">${t.item_count} بنود</span>
          <button class="btn btn-secondary btn-sm btn-icon" onclick="editTemplate(${t.id})" title="تعديل"><i class="fas fa-edit"></i></button>
          <button class="btn btn-danger btn-sm btn-icon" onclick="deleteTemplate(${t.id})" title="حذف"><i class="fas fa-trash"></i></button>
        </div>
      </div>
      <div class="card-body" style="padding:0" id="items-${t.id}">
        <div style="text-align:center;color:#94a3b8;padding:20px">
          <button class="btn btn-secondary btn-sm" onclick="loadItems(${t.id})"><i class="fas fa-expand"></i> عرض البنود والمحاور</button>
        </div>
      </div>
    </div>
  `;
}

async function loadChecklists() {
  checklists = await api('GET', '/api/checklists');
  const grid = document.getElementById('checklists-grid');
  if (!checklists.length) {
    grid.innerHTML = '<div class="card" style="grid-column:1/-1"><div class="card-body empty-state"><i class="fas fa-list-check"></i><p>لا توجد قوائم تدقيق بعد</p></div></div>';
    return;
  }
  const globalList = checklists.filter(t => t.is_global);
  const regularList = checklists.filter(t => !t.is_global);
  let html = '';
  if (globalList.length) {
    html += `<div style="grid-column:1/-1;padding:10px 0 6px;border-bottom:2px solid #0e7490;margin-bottom:4px">
      <h3 style="color:#0e7490;font-size:15px;font-weight:700"><i class="fas fa-globe"></i> القوائم العامة</h3>
    </div>`;
    html += globalList.map(t => renderChecklistCard(t)).join('');
  }
  if (regularList.length) {
    html += `<div style="grid-column:1/-1;padding:10px 0 6px;border-bottom:2px solid #e2e8f0;margin-bottom:4px${globalList.length ? ';margin-top:20px' : ''}">
      <h3 style="color:#475569;font-size:15px;font-weight:700"><i class="fas fa-building"></i> قوائم الأقسام</h3>
    </div>`;
    html += regularList.map(t => renderChecklistCard(t)).join('');
  }
  grid.innerHTML = html;
}

async function loadItems(tmplId) {
  try {
    const items = await api('GET', `/api/checklists/${tmplId}/items`);
    templateItemsCache[tmplId] = items;
    renderTemplateItems(tmplId);
  } catch (e) { showToast(e.message, 'error'); }
}

function renderTemplateItems(tmplId) {
  const el = document.getElementById(`items-${tmplId}`);
  if (!el) return;
  const items = templateItemsCache[tmplId] || [];
  const sections = getSections(tmplId, items);

  let html = `<div style="display:flex;gap:8px;padding:10px 16px;border-bottom:1px solid #e2e8f0;background:#f8fafc">
    <input type="text" id="sec-input-${tmplId}" class="form-control" placeholder="اسم المحور الجديد..." style="flex:1;height:34px;font-size:13px">
    <button class="btn btn-secondary btn-sm" onclick="addSection(${tmplId})"><i class="fas fa-plus"></i> إضافة محور</button>
  </div>`;

  if (!sections.length) {
    html += `<div style="text-align:center;color:#94a3b8;padding:16px;font-size:13px">أضف محوراً لتبدأ في إضافة البنود</div>`;
    el.innerHTML = html;
    return;
  }

  sections.forEach(secName => {
    const secItems = items.filter(i => (i.section_name || 'عام') === secName)
      .sort((a, b) => a.order_num - b.order_num);
    const safe = secName.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    html += `<div style="margin:12px 16px;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden">
      <div style="background:#f1f5f9;padding:8px 12px;display:flex;align-items:center;gap:8px">
        <i class="fas fa-layer-group" style="color:#0e7490"></i>
        <span style="font-weight:600;color:#0e7490;flex:1">${secName}</span>
        <span style="font-size:12px;color:#64748b">${secItems.length} بنود</span>
        <button class="btn btn-secondary btn-sm btn-icon" onclick="promptRenameSection(${tmplId},'${safe}')" title="تعديل الاسم"><i class="fas fa-edit"></i></button>
        <button class="btn btn-primary btn-sm" onclick="openAddItemInSection(${tmplId},'${safe}')"><i class="fas fa-plus"></i> بند</button>
        <button class="btn btn-danger btn-sm btn-icon" onclick="deleteSection(${tmplId},'${safe}')" title="حذف المحور"><i class="fas fa-trash"></i></button>
      </div>
      <div style="padding:4px 12px">`;
    if (!secItems.length) {
      html += `<div style="text-align:center;color:#94a3b8;padding:10px;font-size:13px">لا توجد بنود — اضغط "+ بند" للإضافة</div>`;
    } else {
      secItems.forEach((item, idx) => {
        html += `<div style="display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:1px solid #f1f5f9">
          <div style="display:flex;flex-direction:column;gap:1px">
            <button class="btn btn-secondary btn-sm btn-icon" style="padding:1px 5px;font-size:10px" ${idx===0?'disabled':''} onclick="moveItemUp(${tmplId},${item.id})"><i class="fas fa-chevron-up"></i></button>
            <button class="btn btn-secondary btn-sm btn-icon" style="padding:1px 5px;font-size:10px" ${idx===secItems.length-1?'disabled':''} onclick="moveItemDown(${tmplId},${item.id})"><i class="fas fa-chevron-down"></i></button>
          </div>
          <div style="flex:1">
            <div style="font-size:14px;${!item.active?'opacity:0.5;text-decoration:line-through':''}">${item.text}</div>
            ${item.gahar_ref?`<span style="font-size:11px;color:#0e7490">GAHAR: ${item.gahar_ref}</span>`:''}
          </div>
          <button class="btn btn-secondary btn-sm btn-icon" onclick="editItem(${tmplId},${item.id})" title="تعديل"><i class="fas fa-edit"></i></button>
          <button class="btn btn-${item.active?'warning':'success'} btn-sm btn-icon" onclick="toggleItem(${tmplId},${item.id},${!item.active})" title="${item.active?'تعطيل':'تفعيل'}"><i class="fas fa-${item.active?'eye-slash':'eye'}"></i></button>
          <button class="btn btn-danger btn-sm btn-icon" onclick="deleteItem(${tmplId},${item.id})" title="حذف"><i class="fas fa-trash"></i></button>
        </div>`;
      });
    }
    html += `</div></div>`;
  });

  html += `<div style="text-align:center;padding:8px;color:#64748b;font-size:12px">${items.length} بند في ${sections.length} محور</div>`;
  el.innerHTML = html;
}

function addSection(tmplId) {
  const input = document.getElementById(`sec-input-${tmplId}`);
  const name = (input.value || '').trim();
  if (!name) return showToast('يرجى إدخال اسم المحور', 'warning');
  const items = templateItemsCache[tmplId] || [];
  if (getSections(tmplId, items).includes(name)) return showToast('هذا المحور موجود بالفعل', 'warning');
  if (!pendingSections[tmplId]) pendingSections[tmplId] = new Set();
  pendingSections[tmplId].add(name);
  input.value = '';
  renderTemplateItems(tmplId);
}

async function promptRenameSection(tmplId, oldName) {
  const newName = prompt('الاسم الجديد للمحور:', oldName);
  if (!newName || newName.trim() === oldName) return;
  try {
    await api('PUT', `/api/checklists/${tmplId}/sections/rename`, { old_name: oldName, new_name: newName.trim() });
    if (pendingSections[tmplId]?.has(oldName)) {
      pendingSections[tmplId].delete(oldName);
      pendingSections[tmplId].add(newName.trim());
    }
    showToast('تم تعديل اسم المحور', 'success');
    await loadItems(tmplId);
    loadChecklists();
  } catch (e) { showToast(e.message, 'error'); }
}

async function deleteSection(tmplId, sectionName) {
  const items = templateItemsCache[tmplId] || [];
  const secItems = items.filter(i => (i.section_name || 'عام') === sectionName);
  if (secItems.length === 0) {
    pendingSections[tmplId]?.delete(sectionName);
    renderTemplateItems(tmplId);
    return;
  }
  if (!confirmAction(`هل تريد حذف المحور "${sectionName}" وجميع بنوده (${secItems.length} بند)؟`)) return;
  try {
    await api('DELETE', `/api/checklists/${tmplId}/sections?section_name=${encodeURIComponent(sectionName)}`);
    showToast('تم حذف المحور', 'success');
    await loadItems(tmplId);
    loadChecklists();
  } catch (e) { showToast(e.message, 'error'); }
}

function openAddItemInSection(tmplId, sectionName) {
  document.getElementById('item-edit-id').value = '';
  document.getElementById('item-tmpl-id').value = tmplId;
  document.getElementById('item-modal-title').textContent = 'إضافة بند';
  document.getElementById('item-text').value = '';
  document.getElementById('item-gahar').value = '';
  document.getElementById('item-order').value = '';
  document.getElementById('item-active').checked = true;
  document.getElementById('item-section').value = sectionName;
  openModal('item-modal');
}

async function moveItemUp(tmplId, itemId) {
  const items = templateItemsCache[tmplId] || [];
  const item = items.find(i => i.id === itemId);
  if (!item) return;
  const secItems = items.filter(i => (i.section_name||'عام') === (item.section_name||'عام'))
    .sort((a, b) => a.order_num - b.order_num);
  const idx = secItems.findIndex(i => i.id === itemId);
  if (idx <= 0) return;
  const prev = secItems[idx - 1];
  try {
    await Promise.all([
      api('PUT', `/api/checklists/${tmplId}/items/${itemId}`, { order_num: prev.order_num }),
      api('PUT', `/api/checklists/${tmplId}/items/${prev.id}`, { order_num: item.order_num }),
    ]);
    await loadItems(tmplId);
  } catch (e) { showToast(e.message, 'error'); }
}

async function moveItemDown(tmplId, itemId) {
  const items = templateItemsCache[tmplId] || [];
  const item = items.find(i => i.id === itemId);
  if (!item) return;
  const secItems = items.filter(i => (i.section_name||'عام') === (item.section_name||'عام'))
    .sort((a, b) => a.order_num - b.order_num);
  const idx = secItems.findIndex(i => i.id === itemId);
  if (idx >= secItems.length - 1) return;
  const next = secItems[idx + 1];
  try {
    await Promise.all([
      api('PUT', `/api/checklists/${tmplId}/items/${itemId}`, { order_num: next.order_num }),
      api('PUT', `/api/checklists/${tmplId}/items/${next.id}`, { order_num: item.order_num }),
    ]);
    await loadItems(tmplId);
  } catch (e) { showToast(e.message, 'error'); }
}

// ── Templates ──
function toggleGlobalDept() {
  const isGlobal = document.getElementById('tmpl-is-global').checked;
  document.getElementById('tmpl-dept-group').style.display = isGlobal ? 'none' : 'block';
}

function openCreateTemplate() {
  document.getElementById('tmpl-edit-id').value = '';
  document.getElementById('tmpl-modal-title').textContent = 'قائمة جديدة';
  document.getElementById('tmpl-name').value = '';
  document.getElementById('tmpl-is-global').checked = false;
  document.getElementById('tmpl-dept').value = '';
  document.getElementById('tmpl-dept-group').style.display = 'block';
  document.getElementById('tmpl-insp-type').value = '';
  openModal('tmpl-modal');
}

async function editTemplate(id) {
  const t = checklists.find(c => c.id === id);
  if (!t) return;
  document.getElementById('tmpl-edit-id').value = id;
  document.getElementById('tmpl-modal-title').textContent = 'تعديل القائمة';
  document.getElementById('tmpl-name').value = t.name;
  document.getElementById('tmpl-is-global').checked = !!t.is_global;
  document.getElementById('tmpl-dept').value = t.dept_id || '';
  document.getElementById('tmpl-dept-group').style.display = t.is_global ? 'none' : 'block';
  document.getElementById('tmpl-insp-type').value = t.inspection_type || '';
  openModal('tmpl-modal');
}

async function saveTemplate() {
  const id = document.getElementById('tmpl-edit-id').value;
  const isGlobal = document.getElementById('tmpl-is-global').checked;
  const body = {
    name: document.getElementById('tmpl-name').value.trim(),
    dept_id: isGlobal ? null : (document.getElementById('tmpl-dept').value || null),
    is_global: isGlobal,
    inspection_type: document.getElementById('tmpl-insp-type').value || null,
  };
  if (!body.name) return showToast('يرجى إدخال اسم القائمة', 'warning');
  try {
    if (id) { await api('PUT', `/api/checklists/${id}`, body); showToast('تم التحديث', 'success'); }
    else { await api('POST', '/api/checklists', body); showToast('تم الإنشاء', 'success'); }
    closeModal('tmpl-modal');
    loadChecklists();
  } catch (e) { showToast(e.message, 'error'); }
}

async function deleteTemplate(id) {
  if (!confirmAction('هل تريد حذف هذه القائمة وجميع بنودها؟')) return;
  try {
    await api('DELETE', `/api/checklists/${id}`);
    showToast('تم الحذف', 'success');
    loadChecklists();
  } catch (e) { showToast(e.message, 'error'); }
}

// ── Items ──
function openAddItem(tmplId) {
  document.getElementById('item-edit-id').value = '';
  document.getElementById('item-tmpl-id').value = tmplId;
  document.getElementById('item-modal-title').textContent = 'إضافة بند';
  document.getElementById('item-text').value = '';
  document.getElementById('item-gahar').value = '';
  document.getElementById('item-order').value = '';
  document.getElementById('item-active').checked = true;
  document.getElementById('item-section').value = 'عام';
  openModal('item-modal');
}

async function editItem(tmplId, itemId) {
  try {
    const items = templateItemsCache[tmplId] || await api('GET', `/api/checklists/${tmplId}/items`);
    const item = items.find(i => i.id === itemId);
    if (!item) return;
    document.getElementById('item-edit-id').value = itemId;
    document.getElementById('item-tmpl-id').value = tmplId;
    document.getElementById('item-modal-title').textContent = 'تعديل البند';
    document.getElementById('item-text').value = item.text;
    document.getElementById('item-gahar').value = item.gahar_ref || '';
    document.getElementById('item-order').value = item.order_num || '';
    document.getElementById('item-active').checked = item.active;
    document.getElementById('item-section').value = item.section_name || 'عام';
    openModal('item-modal');
  } catch (e) { showToast(e.message, 'error'); }
}

async function saveItem() {
  const id = document.getElementById('item-edit-id').value;
  const tmplId = document.getElementById('item-tmpl-id').value;
  const body = {
    text: document.getElementById('item-text').value.trim(),
    gahar_ref: document.getElementById('item-gahar').value.trim() || null,
    order_num: parseInt(document.getElementById('item-order').value) || null,
    active: document.getElementById('item-active').checked,
    section_name: document.getElementById('item-section').value.trim() || 'عام',
  };
  if (!body.text) return showToast('يرجى إدخال نص البند', 'warning');
  try {
    if (id) { await api('PUT', `/api/checklists/${tmplId}/items/${id}`, body); showToast('تم التحديث', 'success'); }
    else { await api('POST', `/api/checklists/${tmplId}/items`, body); showToast('تم الإضافة', 'success'); }
    closeModal('item-modal');
    await loadItems(parseInt(tmplId));
    loadChecklists();
  } catch (e) { showToast(e.message, 'error'); }
}

async function toggleItem(tmplId, itemId, newActive) {
  try {
    await api('PUT', `/api/checklists/${tmplId}/items/${itemId}`, { active: newActive });
    showToast(newActive ? 'تم التفعيل' : 'تم التعطيل', 'success');
    await loadItems(tmplId);
  } catch (e) { showToast(e.message, 'error'); }
}

async function deleteItem(tmplId, itemId) {
  if (!confirmAction('هل تريد حذف هذا البند؟')) return;
  try {
    await api('DELETE', `/api/checklists/${tmplId}/items/${itemId}`);
    showToast('تم الحذف', 'success');
    await loadItems(tmplId);
    loadChecklists();
  } catch (e) { showToast(e.message, 'error'); }
}

// ── Import ──
let importParsedFile = null;

function openImportModal() {
  document.getElementById('imp-name').value = '';
  document.getElementById('imp-is-global').checked = false;
  document.getElementById('imp-dept-group').style.display = 'block';
  document.getElementById('imp-insp-type').value = '';
  document.getElementById('imp-file').value = '';
  document.getElementById('imp-preview').style.display = 'none';
  document.getElementById('imp-confirm-btn').disabled = true;
  importParsedFile = null;
  const sel = document.getElementById('imp-dept');
  if (sel.options.length <= 1) {
    depts.forEach(d => {
      const o = document.createElement('option');
      o.value = d.id; o.textContent = d.name;
      sel.appendChild(o);
    });
  }
  openModal('import-modal');
}

function toggleImportGlobal() {
  document.getElementById('imp-dept-group').style.display =
    document.getElementById('imp-is-global').checked ? 'none' : 'block';
}

function handleImportFile(input) {
  const file = input.files[0];
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext !== 'xlsx' && ext !== 'csv') {
    showToast('يجب أن يكون الملف من نوع xlsx أو csv', 'error');
    input.value = ''; return;
  }
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      const dataRows = rows.slice(1).filter(r => r.some(c => String(c).trim() !== ''));
      importParsedFile = file;
      const preview = dataRows.slice(0, 5);
      document.getElementById('imp-preview-body').innerHTML = preview.map(row => `<tr>
        <td>${String(row[0]||'').trim() || 'عام'}</td>
        <td>${String(row[1]||'').trim() || '—'}</td>
        <td>${String(row[2]||'').trim() || '—'}</td>
      </tr>`).join('');
      const over = dataRows.length > 200;
      document.getElementById('imp-total-count').textContent =
        `إجمالي البنود: ${dataRows.length}${over ? ' ⚠ تجاوز الحد الأقصى 200' : ''}`;
      document.getElementById('imp-preview').style.display = 'block';
      document.getElementById('imp-confirm-btn').disabled = dataRows.length === 0 || over;
      if (over) showToast('الحد الأقصى 200 بند لكل استيراد', 'warning');
    } catch(ex) {
      showToast('خطأ في قراءة الملف', 'error');
      input.value = ''; importParsedFile = null;
    }
  };
  reader.readAsArrayBuffer(file);
}

function downloadSample() {
  const a = document.createElement('a');
  a.href = '/api/checklists/sample';
  a.download = 'checklist-sample.xlsx';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

async function confirmImport() {
  const name = document.getElementById('imp-name').value.trim();
  if (!name) return showToast('يرجى إدخال اسم القائمة', 'warning');
  const isGlobal = document.getElementById('imp-is-global').checked;
  const deptId = document.getElementById('imp-dept').value;
  if (!isGlobal && !deptId) return showToast('يرجى اختيار القسم', 'warning');
  if (!importParsedFile) return showToast('يرجى اختيار ملف', 'warning');

  const fd = new FormData();
  fd.append('name', name);
  fd.append('dept_id', deptId || '');
  fd.append('is_global', isGlobal ? 'true' : 'false');
  fd.append('inspection_type', document.getElementById('imp-insp-type').value || '');
  fd.append('file', importParsedFile);

  const btn = document.getElementById('imp-confirm-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الاستيراد...';
  try {
    const res = await fetch('/api/checklists/import', { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'حدث خطأ');
    showToast(`تم استيراد ${data.items_count} بند في ${data.sections_count} محور`, 'success');
    closeModal('import-modal');
    loadChecklists();
  } catch(e) {
    showToast(e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-file-import"></i> استيراد';
  }
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

initPage('checklists');
loadInit().then(loadChecklists);
</script>
